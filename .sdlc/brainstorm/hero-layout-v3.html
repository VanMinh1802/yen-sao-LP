<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Layout V3 (Dark Mode) — Yến Sào Ngọc Thảo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #1A0A00; /* dark brown bg */
    color: #f5f0ea;
    padding: 40px 24px;
  }
  .page-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #f5f0ea;
    margin-bottom: 8px;
  }
  .page-subtitle {
    text-align: center;
    font-size: 15px;
    color: #a89486;
    margin-bottom: 48px;
  }
  .options-wrap {
    display: flex;
    flex-direction: column;
    gap: 48px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .option-block {
    background: #2D1810; /* brown dark container block */
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 16px 60px rgba(0,0,0,0.5);
    border: 1px solid #3d2b1f;
  }
  .mockup-wrap {
    border-radius: 12px;
    overflow: hidden;
  }

  /* ===== LAYOUT A V3: SPLIT (CONTENT LEFT, IMG RIGHT) - DARK MODE ===== */
  .layout-a {
    display: flex;
    height: 500px;
    background: #1A0A00; /* Very dark brown */
  }
  .layout-a__content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    padding-right: 32px;
    position: relative;
    z-index: 2;
  }
  .layout-a__img {
    width: 70%;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .layout-a__img-inner {
    width: 100%; height: 100%;
    background: url('../../assets/ảnh yến/IMG_7596.jpeg') center/cover no-repeat;
    transition: transform 0.6s ease;
  }
  .layout-a:hover .layout-a__img-inner { transform: scale(1.04); }
  
  /* Gradient fade on the left side of the image to blend smoothly into the dark content */
  .layout-a__img::before {
    content: '';
    position: absolute;
    left: -1px; top: 0; bottom: 0; width: 150px;
    background: linear-gradient(to left, transparent, #1A0A00);
    z-index: 1;
  }

  /* Darken the image slightly so text overlay (if any) or mood matches better */
  .layout-a__img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.15); /* subtle dark overlay */
    z-index: 1;
  }
  
  .layout-a__label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .layout-a__label::before,
  .layout-a__label::after {
    content: '';
    width: 32px; height: 1px;
    background: #D4A843;
    display: inline-block;
  }
  .layout-a__title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .layout-a__title em {
    font-style: italic;
    color: #D4A843;
  }
  .layout-a__slogan {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    color: #D4A843; /* Gold */
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .layout-a__slogan span {
    display: block;
    font-size: 0.9em;
    margin-top: 2px;
    opacity: 0.85;
  }

  .layout-a__btns { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .btn-gold {
    padding: 14px 28px;
    background: linear-gradient(135deg, #B8860B, #D4A843);
    color: #1a0f0a; /* dark text for contrast on gold button */
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(184,134,11,0.4); }
  
  .btn-outline-gold {
    padding: 14px 28px;
    background: transparent;
    color: #D4A843;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    border: 2px solid #D4A843;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    width: 100%;
  }
  .btn-outline-gold:hover { background: #D4A843; color: #1a0f0a; }

  .layout-a__stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid rgba(212,168,67,0.25);
    width: 100%;
  }
  .stat-mini-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    display: block;
    margin-bottom: 4px;
  }
  .stat-mini-lbl {
    font-size: 11px;
    color: #D4A843;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1 class="page-title">Hero Section — Tùy chỉnh Nền Đen</h1>
<p class="page-subtitle">Phong cách Luxury Dark (Nền đen quyền lực, chữ vàng vương giả)</p>

<div class="options-wrap">
  <div class="option-block">
    <div class="mockup-wrap">
      <div class="layout-a">
        <div class="layout-a__content">
          <div class="layout-a__label">Hơn 20 Năm Uy Tín</div>
          <h2 class="layout-a__title">Yến Sào<br/><em>Ngọc Thảo</em></h2>
          <div class="layout-a__slogan">
            Thành Ý Gửi Trao
            <span>— Tâm Giao Nhân Khắp</span>
          </div>
          
          <div class="layout-a__btns">
            <button class="btn-gold">Xem Sản Phẩm</button>
            <button class="btn-outline-gold">Liên Hệ Ngay</button>
          </div>
          <div class="layout-a__stats">
            <div class="stat-mini"><span class="stat-mini-num">20+</span><span class="stat-mini-lbl">Năm</span></div>
            <div class="stat-mini"><span class="stat-mini-num">100%</span><span class="stat-mini-lbl">Tự nhiên</span></div>
            <div class="stat-mini"><span class="stat-mini-num">1000+</span><span class="stat-mini-lbl">Khách hàng</span></div>
          </div>
        </div>
        <div class="layout-a__img">
          <div class="layout-a__img-inner"></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
