<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Layout V2 — Yến Sào Ngọc Thảo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #f5f0ea;
    color: #2d1810;
    padding: 40px 24px;
  }
  .page-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #3d2b1f;
    margin-bottom: 8px;
  }
  .page-subtitle {
    text-align: center;
    font-size: 15px;
    color: #7a5c4a;
    margin-bottom: 48px;
  }
  .options-wrap {
    display: flex;
    flex-direction: column;
    gap: 48px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .option-block {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 16px 60px rgba(184,134,11,0.18);
    border: 3px solid #B8860B;
  }
  .mockup-wrap {
    border-radius: 12px;
    overflow: hidden;
  }

  /* ===== LAYOUT A V2: SPLIT (CONTENT LEFT, IMG RIGHT) ===== */
  .layout-a {
    display: flex;
    height: 500px;
    background: #FEFCF3;
  }
  .layout-a__content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    padding-right: 40px;
  }
  .layout-a__img {
    width: 60%;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .layout-a__img-inner {
    width: 100%; height: 100%;
    background: url('../../assets/ảnh yến/IMG_7596.jpeg') center/cover no-repeat;
    transition: transform 0.6s ease;
  }
  .layout-a:hover .layout-a__img-inner { transform: scale(1.04); }
  
  /* Gradient fade on the left side of the image to blend smoothly into the content */
  .layout-a__img::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 120px;
    background: linear-gradient(to left, transparent, #FEFCF3);
    z-index: 1;
  }
  
  .layout-a__label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B8860B;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .layout-a__label::before {
    content: '';
    width: 32px; height: 1px;
    background: #B8860B;
    display: inline-block;
  }
  .layout-a__title {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #2d1810;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .layout-a__title em {
    font-style: italic;
    color: #B8860B;
  }
  .layout-a__slogan {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: #8B6914;
    margin-bottom: 12px;
  }
  .layout-a__sub {
    font-size: 15px;
    color: #7a5c4a;
    line-height: 1.7;
    margin-bottom: 32px;
    max-width: 320px;
  }
  .layout-a__btns { display: flex; gap: 16px; }
  .btn-gold {
    padding: 14px 28px;
    background: linear-gradient(135deg, #B8860B, #D4A843);
    color: white;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(184,134,11,0.3); }
  
  .btn-outline-gold {
    padding: 14px 28px;
    background: transparent;
    color: #B8860B;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    border: 2px solid #B8860B;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-outline-gold:hover { background: #B8860B; color: white; }

  .layout-a__stats {
    display: flex;
    gap: 32px;
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid rgba(184,134,11,0.2);
  }
  .stat-mini-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #B8860B;
    display: block;
    margin-bottom: 4px;
  }
  .stat-mini-lbl {
    font-size: 11px;
    color: #7a5c4a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1 class="page-title">Hero Section — Phương án chốt</h1>
<p class="page-subtitle">Nội dung bên trái, ảnh bên phải, phong cách Natural Elegant và slogan yêu cầu</p>

<div class="options-wrap">
  <div class="option-block">
    <div class="mockup-wrap">
      <div class="layout-a">
        <div class="layout-a__content">
          <div class="layout-a__label">Hơn 20 Năm Uy Tín</div>
          <h2 class="layout-a__title">Yến Sào<br/><em>Ngọc Thảo</em></h2>
          <div class="layout-a__slogan">Thành Ý Gửi Trao — Tâm Giao Nhân Khắp</div>

          <div class="layout-a__btns">
            <button class="btn-gold">Xem Sản Phẩm</button>
            <button class="btn-outline-gold">Liên Hệ Ngay</button>
          </div>
          <div class="layout-a__stats">
            <div class="stat-mini"><span class="stat-mini-num">20+</span><span class="stat-mini-lbl">Năm</span></div>
            <div class="stat-mini"><span class="stat-mini-num">100%</span><span class="stat-mini-lbl">Tự nhiên</span></div>
            <div class="stat-mini"><span class="stat-mini-num">1000+</span><span class="stat-mini-lbl">Khách hàng</span></div>
          </div>
        </div>
        <div class="layout-a__img">
          <div class="layout-a__img-inner"></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
